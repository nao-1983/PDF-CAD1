<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PDF CAD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2228">
<title>PDF CAD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #1e2228; color: #e8eaed; user-select: none; -webkit-user-select: none;
    /* セーフエリア対応 */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right); }
  #app { display: flex; flex-direction: column; height: 100vh; }

  #toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 8px;
    background: #2a2f37; border-bottom: 1px solid #3a4049; flex-wrap: wrap; }
  .tool-btn { min-width: 50px; height: 42px; padding: 0 10px; border: 1px solid #3a4049;
    background: #353b44; color: #e8eaed; border-radius: 7px; font-size: 12px;
    font-weight: 500; cursor: pointer; touch-action: manipulation; }
  .tool-btn:active { background: #4a5260; }
  .tool-btn.active { background: #5b8def; border-color: #5b8def; color: white; }
  .tool-btn.danger { background: #5a3a3a; }
  .tool-btn.file { background: #3a5a3a; }
  .tool-btn.toggle.on { background: #2a7a4a; border-color: #2a7a4a; }
  .divider { width: 1px; height: 26px; background: #3a4049; margin: 0 2px; }

  #info { padding: 5px 10px; background: #252a31; font-size: 11px;
    color: #9aa3ad; border-bottom: 1px solid #3a4049;
    display: flex; gap: 14px; flex-wrap: wrap; }
  #info b { color: #e8eaed; }

  /* 第2列: スタイル設定バー */
  #style-bar { display: flex; align-items: center; gap: 6px; padding: 5px 8px;
    background: #252a31; border-bottom: 1px solid #3a4049; flex-wrap: wrap; }
  #style-bar label { font-size: 11px; color: #9aa3ad; }
  .color-sw { width: 26px; height: 26px; border-radius: 4px; cursor: pointer;
    border: 2px solid #3a4049; }
  .color-sw.active { border-color: #fff; }
  .lt-btn, .lw-btn { padding: 4px 8px; background: #353b44; border: 1px solid #3a4049;
    border-radius: 4px; color: #e8eaed; font-size: 11px; cursor: pointer; min-width: 44px; }
  .lt-btn.active, .lw-btn.active { background: #5b8def; border-color: #5b8def; }
  .lt-btn svg { vertical-align: middle; }

  #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #14171c;
    touch-action: none; }
  #pdf-canvas, #draw-canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  #pdf-canvas { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
  #draw-canvas { pointer-events: none; }

  /* ルーペ */
  #loupe { position: absolute; width: 140px; height: 140px;
    border-radius: 50%; border: 3px solid #ffc107; pointer-events: none;
    background: white; overflow: hidden; display: none; z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  #loupe canvas { position: absolute; top: 0; left: 0; }
  #loupe::after { content: ''; position: absolute; top: 50%; left: 50%;
    width: 20px; height: 20px; transform: translate(-50%, -50%);
    border: 1.5px solid #d32f2f; border-radius: 50%; pointer-events: none; }
  #loupe::before { content: ''; position: absolute; top: 50%; left: 50%;
    width: 1px; height: 30px; transform: translate(-50%, -50%);
    background: #d32f2f; }
  #loupe-cross { position: absolute; top: 50%; left: 50%;
    width: 30px; height: 1px; transform: translate(-50%, -50%);
    background: #d32f2f; pointer-events: none; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.show { display: flex; }
  .modal { background: #2a2f37; border-radius: 12px; padding: 20px; min-width: 280px;
    border: 1px solid #3a4049; }
  .modal h3 { margin: 0 0 12px; font-size: 16px; }
  .modal label { display: block; font-size: 12px; color: #9aa3ad; margin: 8px 0 4px; }
  .modal input, .modal textarea { width: 100%; padding: 10px; font-size: 16px;
    background: #1e2228; border: 1px solid #3a4049; border-radius: 6px;
    color: #e8eaed; font-family: inherit; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 6px; border: none;
    font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary { background: #5b8def; color: white; }
  .btn-cancel { background: #3a4049; color: #e8eaed; }

  #status { position: absolute; bottom: 12px; left: 12px; padding: 8px 12px;
    background: rgba(40,45,52,0.95); border-radius: 6px; font-size: 12px;
    color: #5b8def; pointer-events: none; max-width: 80%; }

  input[type="file"] { display: none; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <label class="tool-btn file" for="file-input">📂 PDF</label>
    <input type="file" id="file-input" accept="application/pdf">
    <div class="divider"></div>
    <button class="tool-btn" data-tool="pan">✋移動</button>
    <button class="tool-btn" data-tool="scale">📏縮尺</button>
    <button class="tool-btn" data-tool="pen">✎ペン</button>
    <button class="tool-btn toggle on" id="straighten-toggle">直線化:ON</button>
    <button class="tool-btn" data-tool="corner">⌐コーナー</button>
    <button class="tool-btn" data-tool="fillet">◜フィレットR</button>
    <button class="tool-btn" data-tool="dim">⟷寸法</button>
    <button class="tool-btn" data-tool="text">A文字</button>
    <button class="tool-btn" data-tool="select">☞選択</button>
    <div class="divider"></div>
    <button class="tool-btn" id="undo-btn">↶戻す</button>
    <button class="tool-btn danger" id="clear-btn">🗑全消去</button>
    <div class="divider"></div>
    <button class="tool-btn file" id="export-btn">💾出力</button>
    <button class="tool-btn" id="zoom-fit">⊡全体</button>
  </div>

  <div id="style-bar">
    <label>色:</label>
    <div class="color-sw active" data-color="#d32f2f" style="background:#d32f2f"></div>
    <div class="color-sw" data-color="#000000" style="background:#000000"></div>
    <div class="color-sw" data-color="#1976d2" style="background:#1976d2"></div>
    <div class="color-sw" data-color="#388e3c" style="background:#388e3c"></div>
    <div class="color-sw" data-color="#f57c00" style="background:#f57c00"></div>
    <div class="divider"></div>
    <label>線種:</label>
    <button class="lt-btn active" data-lt="solid"><svg width="32" height="6"><line x1="0" y1="3" x2="32" y2="3" stroke="#e8eaed" stroke-width="2"/></svg></button>
    <button class="lt-btn" data-lt="dashed"><svg width="32" height="6"><line x1="0" y1="3" x2="32" y2="3" stroke="#e8eaed" stroke-width="2" stroke-dasharray="6,3"/></svg></button>
    <button class="lt-btn" data-lt="dashdot"><svg width="32" height="6"><line x1="0" y1="3" x2="32" y2="3" stroke="#e8eaed" stroke-width="2" stroke-dasharray="8,3,2,3"/></svg></button>
    <button class="lt-btn" data-lt="dotted"><svg width="32" height="6"><line x1="0" y1="3" x2="32" y2="3" stroke="#e8eaed" stroke-width="2" stroke-dasharray="2,3"/></svg></button>
    <div class="divider"></div>
    <label>太さ:</label>
    <button class="lw-btn" data-lw="0.6">細</button>
    <button class="lw-btn active" data-lw="1.2">標準</button>
    <button class="lw-btn" data-lw="2.0">太</button>
    <button class="lw-btn" data-lw="3.0">極太</button>
    <div class="divider"></div>
    <label>文字:</label>
    <button class="lw-btn" data-fs="10">小</button>
    <button class="lw-btn active" data-fs="14">中</button>
    <button class="lw-btn" data-fs="20">大</button>
  </div>

  <div id="info">
    <span>ツール: <b id="tool-name">なし</b></span>
    <span>縮尺: <b id="scale-info">未設定</b></span>
    <span>図形: <b id="shape-count">0</b></span>
    <span>ズーム: <b id="zoom-info">100%</b></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
    <div id="loupe"><canvas id="loupe-canvas"></canvas><div id="loupe-cross"></div></div>
    <div id="status">PDFを開いてください</div>
  </div>
</div>

<!-- 縮尺入力 -->
<div class="modal-bg" id="scale-modal">
  <div class="modal">
    <h3>📏 縮尺の設定</h3>
    <div style="font-size:12px;color:#9aa3ad;margin-bottom:8px">2点間の実寸を入力</div>
    <label>実寸 (mm)</label>
    <input type="number" id="scale-input" placeholder="例: 1000" step="0.1">
    <div class="modal-btns">
      <button class="btn-cancel" id="scale-cancel">キャンセル</button>
      <button class="btn-primary" id="scale-ok">決定</button>
    </div>
  </div>
</div>

<!-- フィレット半径 -->
<div class="modal-bg" id="fillet-modal">
  <div class="modal">
    <h3>◜ フィレット半径</h3>
    <label>R (mm)</label>
    <input type="number" id="fillet-input" value="10" step="0.1">
    <div class="modal-btns">
      <button class="btn-cancel" id="fillet-cancel">キャンセル</button>
      <button class="btn-primary" id="fillet-ok">決定</button>
    </div>
  </div>
</div>

<!-- テキスト入力 -->
<div class="modal-bg" id="text-modal">
  <div class="modal">
    <h3>A 文字入力</h3>
    <label>テキスト</label>
    <textarea id="text-input" placeholder="例: VVF1.6-2C"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" id="text-cancel">キャンセル</button>
      <button class="btn-primary" id="text-ok">配置</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const state = {
  pdfDoc: null, pdfPage: null, pdfBytes: null,
  pdfWidth: 0, pdfHeight: 0, renderScale: 2,
  viewZoom: 1, panX: 0, panY: 0,
  tool: null, shapes: [], scale: null,
  // 現在のスタイル
  curColor: '#d32f2f', curLineType: 'solid', curLineWidth: 1.2, curFontSize: 14,
  straighten: true,
  // ペン描画
  penStroke: null,
  // 進行中のタップシーケンス
  tempPoints: [], pendingScalePoints: null, pendingFilletLines: null, pendingTextPos: null,
  lastMove: null,
  longPress: null,
};

const pdfCanvas = document.getElementById('pdf-canvas');
const drawCanvas = document.getElementById('draw-canvas');
const pctx = pdfCanvas.getContext('2d');
const dctx = drawCanvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const loupe = document.getElementById('loupe');
const loupeCanvas = document.getElementById('loupe-canvas');
const lctx = loupeCanvas.getContext('2d');
const statusEl = document.getElementById('status');

const LINE_DASH = {
  solid: [], dashed: [8, 4], dashdot: [10, 4, 2, 4], dotted: [2, 4]
};

// ===== 座標変換 =====
function screenToPdf(sx, sy) {
  const rect = wrap.getBoundingClientRect();
  const x = (sx - rect.left - state.panX) / state.viewZoom / state.renderScale;
  const y = (sy - rect.top - state.panY) / state.viewZoom / state.renderScale;
  return { x, y };
}
function pdfToScreen(px, py) {
  return {
    x: px * state.renderScale * state.viewZoom + state.panX,
    y: py * state.renderScale * state.viewZoom + state.panY
  };
}

// ===== PDF読み込み =====
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  statusEl.textContent = 'PDF読み込み中...';
  const ab = await file.arrayBuffer();
  state.pdfBytes = ab.slice(0);
  const pdf = await pdfjsLib.getDocument({data: new Uint8Array(ab)}).promise;
  state.pdfDoc = pdf;
  state.pdfPage = await pdf.getPage(1);
  const vp = state.pdfPage.getViewport({scale: 1});
  state.pdfWidth = vp.width;
  state.pdfHeight = vp.height;
  await renderPdf();
  fitToScreen();
  statusEl.textContent = '読み込み完了';
});

async function renderPdf() {
  const vp = state.pdfPage.getViewport({scale: state.renderScale});
  pdfCanvas.width = vp.width;
  pdfCanvas.height = vp.height;
  drawCanvas.width = vp.width;
  drawCanvas.height = vp.height;
  await state.pdfPage.render({canvasContext: pctx, viewport: vp}).promise;
  redraw();
}

function fitToScreen() {
  const rect = wrap.getBoundingClientRect();
  const sx = rect.width / pdfCanvas.width;
  const sy = rect.height / pdfCanvas.height;
  state.viewZoom = Math.min(sx, sy) * 0.95;
  state.panX = (rect.width - pdfCanvas.width * state.viewZoom) / 2;
  state.panY = (rect.height - pdfCanvas.height * state.viewZoom) / 2;
  applyTransform();
}

function applyTransform() {
  const t = `translate(${state.panX}px, ${state.panY}px) scale(${state.viewZoom})`;
  pdfCanvas.style.transform = t;
  drawCanvas.style.transform = t;
  document.getElementById('zoom-info').textContent = Math.round(state.viewZoom * 100) + '%';
}

// ===== 描画 =====
function applyShapeStyle(s) {
  const rs = state.renderScale;
  dctx.strokeStyle = s.color || '#d32f2f';
  dctx.fillStyle = s.color || '#d32f2f';
  dctx.lineWidth = (s.lineWidth || 1.2) * rs / state.viewZoom * 0.5;
  dctx.lineCap = 'round'; dctx.lineJoin = 'round';
  const dash = LINE_DASH[s.lineType || 'solid'];
  dctx.setLineDash(dash.map(v => v * rs / state.viewZoom * 0.5));
}

function redraw() {
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  for (const s of state.shapes) drawShape(s);
  if (state.penStroke) drawPenStrokePreview(state.penStroke);
  if (state.tempPoints.length > 0 && state.lastMove) drawPreview();
  document.getElementById('shape-count').textContent = state.shapes.length;
}

function drawShape(s) {
  const rs = state.renderScale;
  applyShapeStyle(s);

  if (s.type === 'line') {
    dctx.beginPath();
    dctx.moveTo(s.a.x * rs, s.a.y * rs);
    dctx.lineTo(s.b.x * rs, s.b.y * rs);
    dctx.stroke();
  } else if (s.type === 'freehand') {
    dctx.beginPath();
    const pts = s.points;
    dctx.moveTo(pts[0].x * rs, pts[0].y * rs);
    for (let i = 1; i < pts.length; i++) dctx.lineTo(pts[i].x * rs, pts[i].y * rs);
    dctx.stroke();
  } else if (s.type === 'arc') {
    dctx.beginPath();
    dctx.arc(s.center.x * rs, s.center.y * rs, s.radius * rs,
      s.startAngle, s.endAngle, s.counter);
    dctx.stroke();
  } else if (s.type === 'dim') {
    dctx.setLineDash([]);
    dctx.beginPath();
    dctx.moveTo(s.a.x * rs, s.a.y * rs);
    dctx.lineTo(s.b.x * rs, s.b.y * rs);
    dctx.stroke();
    const sz = 6 * rs;
    drawTick(s.a, s.b, sz);
    drawTick(s.b, s.a, sz);
    const mid = { x: (s.a.x+s.b.x)/2*rs, y: (s.a.y+s.b.y)/2*rs };
    const angle = Math.atan2(s.b.y-s.a.y, s.b.x-s.a.x);
    dctx.save();
    dctx.translate(mid.x, mid.y);
    dctx.rotate(Math.abs(angle) > Math.PI/2 ? angle + Math.PI : angle);
    dctx.font = `bold ${14 * rs}px sans-serif`;
    dctx.textAlign = 'center';
    dctx.textBaseline = 'bottom';
    const text = formatDim(s.value);
    const m = dctx.measureText(text);
    dctx.fillStyle = 'rgba(255,255,255,0.92)';
    dctx.fillRect(-m.width/2 - 4, -16*rs, m.width + 8, 18*rs);
    dctx.fillStyle = s.color || '#1976d2';
    dctx.fillText(text, 0, -3*rs);
    dctx.restore();
  } else if (s.type === 'text') {
    dctx.setLineDash([]);
    dctx.fillStyle = s.color || '#000';
    dctx.font = `${(s.fontSize || 14) * rs}px sans-serif`;
    dctx.textBaseline = 'top';
    const lines = s.text.split('\n');
    for (let i = 0; i < lines.length; i++) {
      dctx.fillText(lines[i], s.pos.x * rs, (s.pos.y + i * (s.fontSize || 14) * 1.2) * rs);
    }
  }
}

function drawTick(p, other, size) {
  const dx = other.x - p.x, dy = other.y - p.y;
  const len = Math.hypot(dx, dy);
  if (len < 1) return;
  const nx = -dy/len, ny = dx/len;
  const rs = state.renderScale;
  dctx.beginPath();
  dctx.moveTo(p.x*rs - nx*size, p.y*rs - ny*size);
  dctx.lineTo(p.x*rs + nx*size, p.y*rs + ny*size);
  dctx.stroke();
}

function formatDim(mm) {
  if (mm >= 1000) return (mm/1000).toFixed(2) + ' m';
  return mm.toFixed(1) + ' mm';
}

function drawPenStrokePreview(pts) {
  const rs = state.renderScale;
  dctx.strokeStyle = state.curColor;
  dctx.lineWidth = state.curLineWidth * rs / state.viewZoom * 0.5;
  dctx.lineCap = 'round'; dctx.lineJoin = 'round';
  dctx.setLineDash(LINE_DASH[state.curLineType].map(v => v * rs / state.viewZoom * 0.5));
  dctx.beginPath();
  dctx.moveTo(pts[0].x * rs, pts[0].y * rs);
  for (let i = 1; i < pts.length; i++) dctx.lineTo(pts[i].x * rs, pts[i].y * rs);
  dctx.stroke();
}

function drawPreview() {
  // (今は使っていないが将来用)
}

// ===== ツール選択 =====
document.querySelectorAll('[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tool = btn.dataset.tool;
    state.tempPoints = [];
    state.penStroke = null;
    document.getElementById('tool-name').textContent = btn.textContent.trim();
    redraw();
    updateStatus();
  });
});

// 直線化トグル
document.getElementById('straighten-toggle').addEventListener('click', (e) => {
  state.straighten = !state.straighten;
  e.target.classList.toggle('on', state.straighten);
  e.target.textContent = '直線化:' + (state.straighten ? 'ON' : 'OFF');
});

// 色
document.querySelectorAll('.color-sw').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-sw').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    state.curColor = sw.dataset.color;
  });
});
// 線種
document.querySelectorAll('.lt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.curLineType = btn.dataset.lt;
  });
});
// 線幅・文字サイズ
document.querySelectorAll('.lw-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.lw) {
      document.querySelectorAll('.lw-btn[data-lw]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.curLineWidth = parseFloat(btn.dataset.lw);
    } else if (btn.dataset.fs) {
      document.querySelectorAll('.lw-btn[data-fs]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.curFontSize = parseFloat(btn.dataset.fs);
    }
  });
});

function updateStatus() {
  const msgs = {
    pan: '指でドラッグ移動、ピンチでズーム',
    scale: '長押しで1点目→2点目を長押し→実寸入力',
    pen: state.straighten ? 'ペンで線を引く(直線化ON: 自動で直線に)' : 'ペンで自由曲線を描く',
    corner: '1本目の線→2本目の線(交点で接合)',
    fillet: '1本目の線→2本目の線→R値入力',
    dim: '寸法の始点→終点',
    text: 'タップで配置位置を決めて入力',
    select: '図形をタップで削除'
  };
  statusEl.textContent = msgs[state.tool] || 'ツール選択';
}

// ===== ルーペ =====
function showLoupe(sx, sy) {
  const rect = wrap.getBoundingClientRect();
  const px = sx - rect.left, py = sy - rect.top;
  // 指の上に被らないよう、左上に表示。画面端では反対側へ
  let lx = px - 160, ly = py - 160;
  if (lx < 8) lx = px + 30;
  if (ly < 8) ly = py + 30;
  loupe.style.left = lx + 'px';
  loupe.style.top = ly + 'px';
  loupe.style.display = 'block';

  // ルーペ内容をPDFキャンバスから切り出して拡大
  const zoom = 3;
  loupeCanvas.width = 140;
  loupeCanvas.height = 140;
  lctx.clearRect(0, 0, 140, 140);
  // PDF canvas上の対応座標
  const cssX = (px - state.panX) / state.viewZoom;
  const cssY = (py - state.panY) / state.viewZoom;
  // 切り出し範囲(PDFキャンバスのピクセル)
  const srcSize = 140 / zoom;
  lctx.imageSmoothingEnabled = false;
  lctx.drawImage(pdfCanvas,
    cssX - srcSize/2, cssY - srcSize/2, srcSize, srcSize,
    0, 0, 140, 140);
  // 描画レイヤーも重ねる
  lctx.drawImage(drawCanvas,
    cssX - srcSize/2, cssY - srcSize/2, srcSize, srcSize,
    0, 0, 140, 140);
}
function hideLoupe() { loupe.style.display = 'none'; }

// ===== タッチ操作 =====
let touches = [], panStart = null, pinchStart = null;

wrap.addEventListener('touchstart', handleTouchStart, {passive: false});
wrap.addEventListener('touchmove', handleTouchMove, {passive: false});
wrap.addEventListener('touchend', handleTouchEnd, {passive: false});
wrap.addEventListener('mousedown', handleMouseDown);
wrap.addEventListener('mousemove', handleMouseMove);
wrap.addEventListener('mouseup', handleMouseUp);

function handleTouchStart(e) {
  e.preventDefault();
  touches = Array.from(e.touches);
  if (touches.length === 1) {
    const t = touches[0];
    panStart = { x: t.clientX, y: t.clientY, panX: state.panX, panY: state.panY, time: Date.now() };
    if (state.tool === 'scale') {
      // 縮尺は長押し+ルーペ
      showLoupe(t.clientX, t.clientY);
      startLongPress(t.clientX, t.clientY);
    } else if (state.tool === 'pen') {
      // ペン描画開始
      const p = screenToPdf(t.clientX, t.clientY);
      state.penStroke = [p];
    }
  } else if (touches.length === 2) {
    cancelLongPress();
    hideLoupe();
    state.penStroke = null;
    pinchStart = getPinchInfo(touches);
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  touches = Array.from(e.touches);
  if (touches.length === 1 && panStart) {
    const t = touches[0];
    const dx = t.clientX - panStart.x, dy = t.clientY - panStart.y;
    // 縮尺ツール: 指が動いてもルーペ追従、長押し成立後は2点目候補移動
    if (state.tool === 'scale') {
      showLoupe(t.clientX, t.clientY);
      if (state.longPress && Math.hypot(dx, dy) > 10) cancelLongPress();
    } else if (state.tool === 'pen' && state.penStroke) {
      const p = screenToPdf(t.clientX, t.clientY);
      state.penStroke.push(p);
      redraw();
    } else if (state.tool === 'pan' || !state.tool) {
      state.panX = panStart.panX + dx;
      state.panY = panStart.panY + dy;
      applyTransform();
    }
  } else if (touches.length === 2 && pinchStart) {
    const now = getPinchInfo(touches);
    const scale = now.dist / pinchStart.dist;
    const newZoom = Math.max(0.1, Math.min(10, pinchStart.zoom * scale));
    const cx = now.cx, cy = now.cy;
    const rect = wrap.getBoundingClientRect();
    const offX = cx - rect.left, offY = cy - rect.top;
    state.viewZoom = newZoom;
    state.panX = offX - (offX - pinchStart.panX) * (newZoom / pinchStart.zoom);
    state.panY = offY - (offY - pinchStart.panY) * (newZoom / pinchStart.zoom);
    applyTransform();
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  cancelLongPress();
  if (state.tool !== 'scale') hideLoupe();
  if (touches.length === 1 && panStart) {
    const dt = Date.now() - panStart.time;
    const moved = e.changedTouches[0];
    const dx = moved.clientX - panStart.x, dy = moved.clientY - panStart.y;
    // ペンストローク確定
    if (state.tool === 'pen' && state.penStroke) {
      finalizePenStroke();
    } else if (dt < 300 && Math.hypot(dx, dy) < 8) {
      handleTap(moved.clientX, moved.clientY);
    }
  }
  touches = Array.from(e.touches);
  if (touches.length < 2) pinchStart = null;
  if (touches.length === 0) {
    panStart = null;
    state.penStroke = null;
  }
}

function getPinchInfo(ts) {
  const dx = ts[1].clientX - ts[0].clientX;
  const dy = ts[1].clientY - ts[0].clientY;
  return {
    dist: Math.hypot(dx, dy),
    cx: (ts[0].clientX + ts[1].clientX) / 2,
    cy: (ts[0].clientY + ts[1].clientY) / 2,
    zoom: state.viewZoom,
    panX: state.panX, panY: state.panY
  };
}

function startLongPress(x, y) {
  cancelLongPress();
  state.longPress = setTimeout(() => {
    handleLongPress(x, y);
    state.longPress = null;
  }, 500);
}
function cancelLongPress() {
  if (state.longPress) { clearTimeout(state.longPress); state.longPress = null; }
}

function handleLongPress(sx, sy) {
  const p = screenToPdf(sx, sy);
  if (state.tool === 'scale') {
    if (state.tempPoints.length === 0) {
      state.tempPoints.push(p);
      statusEl.textContent = '✓ 1点目セット。指を離して2点目を長押し';
      if (navigator.vibrate) navigator.vibrate(50);
    } else {
      state.tempPoints.push(p);
      state.pendingScalePoints = [state.tempPoints[0], p];
      state.tempPoints = [];
      hideLoupe();
      if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
      showScaleModal();
    }
    redraw();
  }
}

// マウス対応(PC確認用)
let mouseLongPressTimer = null;
function handleMouseDown(e) {
  panStart = { x: e.clientX, y: e.clientY, panX: state.panX, panY: state.panY, time: Date.now() };
  if (state.tool === 'scale') {
    showLoupe(e.clientX, e.clientY);
    mouseLongPressTimer = setTimeout(() => handleLongPress(e.clientX, e.clientY), 500);
  } else if (state.tool === 'pen') {
    state.penStroke = [screenToPdf(e.clientX, e.clientY)];
  }
}
function handleMouseMove(e) {
  if (!panStart) return;
  const dx = e.clientX - panStart.x, dy = e.clientY - panStart.y;
  if (state.tool === 'scale') {
    showLoupe(e.clientX, e.clientY);
    if (mouseLongPressTimer && Math.hypot(dx, dy) > 5) {
      clearTimeout(mouseLongPressTimer); mouseLongPressTimer = null;
    }
  } else if (state.tool === 'pen' && state.penStroke) {
    state.penStroke.push(screenToPdf(e.clientX, e.clientY));
    redraw();
  } else if (state.tool === 'pan' || !state.tool) {
    state.panX = panStart.panX + dx;
    state.panY = panStart.panY + dy;
    applyTransform();
  }
}
function handleMouseUp(e) {
  if (mouseLongPressTimer) { clearTimeout(mouseLongPressTimer); mouseLongPressTimer = null; }
  if (state.tool !== 'scale') hideLoupe();
  if (panStart) {
    const dt = Date.now() - panStart.time;
    const dx = e.clientX - panStart.x, dy = e.clientY - panStart.y;
    if (state.tool === 'pen' && state.penStroke) {
      finalizePenStroke();
    } else if (dt < 300 && Math.hypot(dx, dy) < 5) handleTap(e.clientX, e.clientY);
  }
  panStart = null;
  state.penStroke = null;
}

wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.max(0.1, Math.min(10, state.viewZoom * factor));
  state.panX = cx - (cx - state.panX) * (newZoom / state.viewZoom);
  state.panY = cy - (cy - state.panY) * (newZoom / state.viewZoom);
  state.viewZoom = newZoom;
  applyTransform();
}, {passive: false});

// ===== ペンストローク確定 =====
function finalizePenStroke() {
  const pts = state.penStroke;
  state.penStroke = null;
  if (!pts || pts.length < 2) return;
  const baseStyle = {
    color: state.curColor, lineType: state.curLineType, lineWidth: state.curLineWidth
  };
  if (state.straighten) {
    const line = straightenStroke(pts);
    if (line) state.shapes.push({type:'line', ...line, ...baseStyle});
  } else {
    state.shapes.push({type:'freehand', points: pts, ...baseStyle});
  }
  redraw();
}

function straightenStroke(points) {
  if (points.length < 2) return null;
  const p0 = points[0], pn = points[points.length-1];
  let dx = pn.x - p0.x, dy = pn.y - p0.y;
  const len = Math.hypot(dx, dy);
  if (len < 2) return null;
  // 0,45,90,135度近辺にスナップ
  let angle = Math.atan2(dy, dx) * 180 / Math.PI;
  const snaps = [-180, -135, -90, -45, 0, 45, 90, 135, 180];
  const snapTol = 5;
  for (const s of snaps) {
    if (Math.abs(angle - s) < snapTol) {
      const rad = s * Math.PI / 180;
      return { a: p0, b: { x: p0.x + Math.cos(rad)*len, y: p0.y + Math.sin(rad)*len } };
    }
  }
  return { a: p0, b: pn };
}

// ===== タップ処理 =====
function handleTap(sx, sy) {
  const p = screenToPdf(sx, sy);
  switch (state.tool) {
    case 'dim': handleDimTap(p); break;
    case 'corner': handleShapePick(p, 'corner'); break;
    case 'fillet': handleShapePick(p, 'fillet'); break;
    case 'select': handleSelect(p); break;
    case 'text': handleTextTap(p); break;
  }
}

function handleDimTap(p) {
  if (!state.scale) { statusEl.textContent = '⚠ 先に縮尺設定'; return; }
  state.tempPoints.push(p);
  if (state.tempPoints.length === 2) {
    const dx = state.tempPoints[1].x - state.tempPoints[0].x;
    const dy = state.tempPoints[1].y - state.tempPoints[0].y;
    const mm = Math.hypot(dx, dy) / state.scale.pxPerMm;
    state.shapes.push({
      type:'dim', a: state.tempPoints[0], b: state.tempPoints[1], value: mm,
      color: state.curColor, lineWidth: state.curLineWidth
    });
    state.tempPoints = [];
    statusEl.textContent = `寸法 ${formatDim(mm)} 追加`;
  }
  redraw();
}

function handleTextTap(p) {
  state.pendingTextPos = p;
  document.getElementById('text-modal').classList.add('show');
  setTimeout(() => document.getElementById('text-input').focus(), 100);
}

function distToLine(p, line) {
  const {a, b} = line;
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx*dx + dy*dy;
  if (len2 < 1e-9) return Math.hypot(p.x-a.x, p.y-a.y);
  let t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x - (a.x + t*dx), p.y - (a.y + t*dy));
}

function findNearestLine(p, threshold) {
  let best = null, bestD = threshold;
  for (let i = 0; i < state.shapes.length; i++) {
    const s = state.shapes[i];
    if (s.type !== 'line') continue;
    const d = distToLine(p, s);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function handleShapePick(p, mode) {
  const thresh = 15 / state.viewZoom / state.renderScale;
  const idx = findNearestLine(p, thresh);
  if (idx === null) { statusEl.textContent = '線が見つかりません'; return; }
  state.tempPoints.push(idx);
  if (state.tempPoints.length === 1) {
    statusEl.textContent = '1本目選択。2本目をタップ';
  } else {
    const i1 = state.tempPoints[0], i2 = state.tempPoints[1];
    state.tempPoints = [];
    if (i1 === i2) { statusEl.textContent = '同じ線です'; return; }
    if (mode === 'corner') applyCorner(i1, i2);
    else if (mode === 'fillet') {
      state.pendingFilletLines = [i1, i2];
      document.getElementById('fillet-modal').classList.add('show');
    }
  }
  redraw();
}

function lineIntersect(L1, L2) {
  const x1=L1.a.x, y1=L1.a.y, x2=L1.b.x, y2=L1.b.y;
  const x3=L2.a.x, y3=L2.a.y, x4=L2.b.x, y4=L2.b.y;
  const denom = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
  if (Math.abs(denom) < 1e-9) return null;
  const t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / denom;
  return { x: x1 + t*(x2-x1), y: y1 + t*(y2-y1) };
}

function farEnd(line, ip) {
  const d1 = Math.hypot(line.a.x-ip.x, line.a.y-ip.y);
  const d2 = Math.hypot(line.b.x-ip.x, line.b.y-ip.y);
  return d1 > d2 ? line.a : line.b;
}

function applyCorner(i1, i2) {
  const L1 = state.shapes[i1], L2 = state.shapes[i2];
  const ip = lineIntersect(L1, L2);
  if (!ip) { statusEl.textContent = '平行で交点なし'; return; }
  const e1 = farEnd(L1, ip), e2 = farEnd(L2, ip);
  // スタイルは元の線を保持
  state.shapes[i1] = {...L1, type:'line', a: e1, b: ip};
  state.shapes[i2] = {...L2, type:'line', a: e2, b: ip};
  statusEl.textContent = 'コーナー処理完了';
}

// フィレット(R円弧で接合)
function applyFillet(i1, i2, rMm) {
  const L1 = state.shapes[i1], L2 = state.shapes[i2];
  const ip = lineIntersect(L1, L2);
  if (!ip) { statusEl.textContent = '平行で交点なし'; return; }
  if (!state.scale) { statusEl.textContent = '⚠ 縮尺未設定'; return; }
  const R = rMm * state.scale.pxPerMm;

  function dirInfo(line, ip) {
    const d1 = Math.hypot(line.a.x-ip.x, line.a.y-ip.y);
    const e = d1 > Math.hypot(line.b.x-ip.x, line.b.y-ip.y) ? line.a : line.b;
    const vx = e.x - ip.x, vy = e.y - ip.y;
    const len = Math.hypot(vx, vy);
    return { x: vx/len, y: vy/len, far: e, len };
  }
  const d1 = dirInfo(L1, ip), d2 = dirInfo(L2, ip);
  const dot = d1.x*d2.x + d1.y*d2.y;
  const angle = Math.acos(Math.max(-1, Math.min(1, dot)));
  if (angle < 1e-3 || angle > Math.PI - 1e-3) {
    statusEl.textContent = '角度が浅すぎてR取れません'; return;
  }
  const tDist = R / Math.tan(angle/2);
  if (tDist > d1.len || tDist > d2.len) {
    statusEl.textContent = `Rが大きすぎ(最大 ${(Math.min(d1.len, d2.len) * Math.tan(angle/2) / state.scale.pxPerMm).toFixed(1)}mm)`;
    return;
  }
  const tp1 = { x: ip.x + d1.x*tDist, y: ip.y + d1.y*tDist };
  const tp2 = { x: ip.x + d2.x*tDist, y: ip.y + d2.y*tDist };
  const bx = d1.x + d2.x, by = d1.y + d2.y;
  const blen = Math.hypot(bx, by);
  const cDist = R / Math.sin(angle/2);
  const center = { x: ip.x + bx/blen*cDist, y: ip.y + by/blen*cDist };

  let sa = Math.atan2(tp1.y - center.y, tp1.x - center.x);
  let ea = Math.atan2(tp2.y - center.y, tp2.x - center.x);
  // 円弧の方向: 短い方を選ぶ
  let diff = ea - sa;
  while (diff > Math.PI) diff -= 2*Math.PI;
  while (diff < -Math.PI) diff += 2*Math.PI;
  const counter = diff < 0;

  // 元の線をトリム + 円弧追加(スタイル継承)
  const style = {
    color: L1.color, lineType: L1.lineType, lineWidth: L1.lineWidth
  };
  state.shapes[i1] = {...L1, type:'line', a: d1.far, b: tp1};
  state.shapes[i2] = {...L2, type:'line', a: d2.far, b: tp2};
  state.shapes.push({
    type:'arc', center, radius: R,
    startAngle: sa, endAngle: ea, counter,
    ...style
  });
  statusEl.textContent = `フィレット R${rMm}mm 完了`;
}

function handleSelect(p) {
  const thresh = 15 / state.viewZoom / state.renderScale;
  // 線・テキストどちらか近い方
  let best = null, bestD = thresh;
  for (let i = 0; i < state.shapes.length; i++) {
    const s = state.shapes[i];
    let d = Infinity;
    if (s.type === 'line') d = distToLine(p, s);
    else if (s.type === 'freehand') {
      for (let j = 0; j < s.points.length-1; j++) {
        d = Math.min(d, distToLine(p, {a: s.points[j], b: s.points[j+1]}));
      }
    } else if (s.type === 'dim') d = distToLine(p, s);
    else if (s.type === 'arc') {
      d = Math.abs(Math.hypot(p.x-s.center.x, p.y-s.center.y) - s.radius);
    } else if (s.type === 'text') {
      const fs = s.fontSize || 14;
      if (p.x >= s.pos.x - 5 && p.x <= s.pos.x + 100 &&
          p.y >= s.pos.y - 5 && p.y <= s.pos.y + fs * 2) d = 0;
    }
    if (d < bestD) { bestD = d; best = i; }
  }
  if (best !== null) {
    if (confirm('この図形を削除しますか?')) {
      state.shapes.splice(best, 1);
      redraw();
    }
  }
}

// ===== モーダル =====
function showScaleModal() {
  document.getElementById('scale-modal').classList.add('show');
  setTimeout(() => document.getElementById('scale-input').focus(), 100);
}
document.getElementById('scale-ok').addEventListener('click', () => {
  const mm = parseFloat(document.getElementById('scale-input').value);
  if (!mm || mm <= 0) { alert('正の数を入力'); return; }
  const [p1, p2] = state.pendingScalePoints;
  const pxDist = Math.hypot(p2.x-p1.x, p2.y-p1.y);
  state.scale = { pxPerMm: pxDist / mm };
  document.getElementById('scale-info').textContent =
    `${mm}mm 基準 (1mm=${state.scale.pxPerMm.toFixed(3)}pt)`;
  document.getElementById('scale-modal').classList.remove('show');
  document.getElementById('scale-input').value = '';
  state.pendingScalePoints = null;
  statusEl.textContent = '縮尺設定完了';
  redraw();
});
document.getElementById('scale-cancel').addEventListener('click', () => {
  document.getElementById('scale-modal').classList.remove('show');
  state.pendingScalePoints = null;
});

document.getElementById('fillet-ok').addEventListener('click', () => {
  const r = parseFloat(document.getElementById('fillet-input').value);
  if (!r || r <= 0) { alert('正の数を入力'); return; }
  const [i1, i2] = state.pendingFilletLines;
  applyFillet(i1, i2, r);
  document.getElementById('fillet-modal').classList.remove('show');
  state.pendingFilletLines = null;
  redraw();
});
document.getElementById('fillet-cancel').addEventListener('click', () => {
  document.getElementById('fillet-modal').classList.remove('show');
  state.pendingFilletLines = null;
});

document.getElementById('text-ok').addEventListener('click', () => {
  const text = document.getElementById('text-input').value;
  if (text && state.pendingTextPos) {
    state.shapes.push({
      type:'text', pos: state.pendingTextPos, text,
      color: state.curColor, fontSize: state.curFontSize
    });
  }
  document.getElementById('text-modal').classList.remove('show');
  document.getElementById('text-input').value = '';
  state.pendingTextPos = null;
  redraw();
});
document.getElementById('text-cancel').addEventListener('click', () => {
  document.getElementById('text-modal').classList.remove('show');
  document.getElementById('text-input').value = '';
  state.pendingTextPos = null;
});

// ===== ボタン =====
document.getElementById('undo-btn').addEventListener('click', () => {
  if (state.shapes.length > 0) { state.shapes.pop(); redraw(); }
});
document.getElementById('clear-btn').addEventListener('click', () => {
  if (state.shapes.length === 0) return;
  if (confirm('すべての描画を削除しますか?')) { state.shapes = []; redraw(); }
});
document.getElementById('zoom-fit').addEventListener('click', () => {
  if (state.pdfDoc) fitToScreen();
});

// ===== PDF出力 =====
function hexToRgb(hex) {
  const m = hex.replace('#','').match(/.{2}/g);
  return PDFLib.rgb(parseInt(m[0],16)/255, parseInt(m[1],16)/255, parseInt(m[2],16)/255);
}
const PDFLIB_DASH = {
  solid: [], dashed: [6, 3], dashdot: [8, 3, 1, 3], dotted: [1, 3]
};

document.getElementById('export-btn').addEventListener('click', async () => {
  if (!state.pdfBytes) { alert('PDFを開いてください'); return; }
  statusEl.textContent = 'PDF生成中...';
  try {
    const pdfDoc = await PDFLib.PDFDocument.load(state.pdfBytes.slice(0));
    const page = pdfDoc.getPages()[0];
    const { height } = page.getSize();
    const drawingsJson = JSON.stringify({version: 2, scale: state.scale, shapes: state.shapes});

    for (const s of state.shapes) {
      const color = hexToRgb(s.color || '#d32f2f');
      const lw = s.lineWidth || 1.2;
      const dash = PDFLIB_DASH[s.lineType || 'solid'];

      if (s.type === 'line') {
        page.drawLine({
          start: { x: s.a.x, y: height - s.a.y },
          end:   { x: s.b.x, y: height - s.b.y },
          thickness: lw, color,
          dashArray: dash.length ? dash : undefined
        });
      } else if (s.type === 'freehand') {
        // ポリラインとして
        const pts = s.points;
        for (let i = 0; i < pts.length - 1; i++) {
          page.drawLine({
            start: { x: pts[i].x, y: height - pts[i].y },
            end:   { x: pts[i+1].x, y: height - pts[i+1].y },
            thickness: lw, color
          });
        }
      } else if (s.type === 'arc') {
        // 円弧を多角形近似
        const steps = 24;
        let sa = s.startAngle, ea = s.endAngle;
        let diff = ea - sa;
        if (s.counter) {
          while (diff > 0) diff -= 2*Math.PI;
        } else {
          while (diff < 0) diff += 2*Math.PI;
        }
        for (let i = 0; i < steps; i++) {
          const a1 = sa + diff * i / steps;
          const a2 = sa + diff * (i+1) / steps;
          const p1 = { x: s.center.x + Math.cos(a1)*s.radius, y: s.center.y + Math.sin(a1)*s.radius };
          const p2 = { x: s.center.x + Math.cos(a2)*s.radius, y: s.center.y + Math.sin(a2)*s.radius };
          page.drawLine({
            start: { x: p1.x, y: height - p1.y },
            end:   { x: p2.x, y: height - p2.y },
            thickness: lw, color
          });
        }
      } else if (s.type === 'dim') {
        page.drawLine({
          start: { x: s.a.x, y: height - s.a.y },
          end:   { x: s.b.x, y: height - s.b.y },
          thickness: lw, color
        });
        const mid = { x:(s.a.x+s.b.x)/2, y: height - (s.a.y+s.b.y)/2 };
        page.drawText(formatDim(s.value), { x: mid.x - 20, y: mid.y + 4, size: 9, color });
      } else if (s.type === 'text') {
        // 日本語フォント未埋め込みのため、Helveticaで描画(英数のみ確実)
        // 日本語は別途フォント埋め込みが必要
        const lines = s.text.split('\n');
        const fs = s.fontSize || 14;
        try {
          for (let i = 0; i < lines.length; i++) {
            page.drawText(lines[i], {
              x: s.pos.x, y: height - s.pos.y - fs * (i+1) * 0.9,
              size: fs, color
            });
          }
        } catch (e) {
          // 日本語フォント未対応の場合のフォールバック
          console.warn('テキスト描画スキップ:', e.message);
        }
      }
    }
    pdfDoc.setSubject('PDFCAD_DATA:' + drawingsJson);
    const bytes = await pdfDoc.save();
    const blob = new Blob([bytes], {type: 'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'cad_drawing.pdf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    statusEl.textContent = 'PDF保存完了';
  } catch (e) {
    console.error(e);
    statusEl.textContent = 'エラー: ' + e.message;
  }
});

document.querySelector('[data-tool="pan"]').click();
</script>
</body>
